<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車窓風景 — Southgate Research PoC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
  }

  .window {
    position: relative;
    width: 800px;
    height: 500px;
    overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  /* === Sky === */
  .sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 40%, #E8F4FD 70%, #FFF8E7 100%);
    z-index: 0;
  }

  /* === Clouds (very slow) === */
  .clouds {
    position: absolute;
    top: 30px;
    left: 0;
    width: 200%;
    height: 120px;
    z-index: 1;
    animation: scroll-slow 80s linear infinite;
  }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 40px; top: 10px; left: 5%; }
  .cloud-1::before { width: 60px; height: 50px; top: -25px; left: 20px; }
  .cloud-1::after { width: 80px; height: 45px; top: -20px; left: 50px; }
  .cloud-2 { width: 100px; height: 35px; top: 50px; left: 30%; }
  .cloud-2::before { width: 50px; height: 40px; top: -20px; left: 15px; }
  .cloud-2::after { width: 65px; height: 38px; top: -18px; left: 40px; }
  .cloud-3 { width: 140px; height: 42px; top: 20px; left: 60%; }
  .cloud-3::before { width: 70px; height: 55px; top: -28px; left: 25px; }
  .cloud-3::after { width: 90px; height: 48px; top: -22px; left: 55px; }
  .cloud-4 { width: 90px; height: 32px; top: 65px; left: 85%; }
  .cloud-4::before { width: 45px; height: 38px; top: -20px; left: 12px; }
  .cloud-4::after { width: 55px; height: 35px; top: -16px; left: 35px; }

  /* === Distant mountains (very slow) === */
  .mountains-far {
    position: absolute;
    bottom: 140px;
    left: 0;
    width: 200%;
    height: 160px;
    z-index: 2;
    animation: scroll-slow 60s linear infinite;
  }
  .mountains-far svg { width: 100%; height: 100%; }

  /* === Hills (slow) === */
  .hills {
    position: absolute;
    bottom: 100px;
    left: 0;
    width: 200%;
    height: 140px;
    z-index: 3;
    animation: scroll-medium 30s linear infinite;
  }
  .hills svg { width: 100%; height: 100%; }

  /* === Trees & buildings (medium) === */
  .midground {
    position: absolute;
    bottom: 60px;
    left: 0;
    width: 200%;
    height: 140px;
    z-index: 4;
    animation: scroll-medium 12s linear infinite;
  }

  .tree {
    position: absolute;
    bottom: 0;
  }
  .tree .trunk {
    width: 8px;
    height: 30px;
    background: #5D4037;
    margin: 0 auto;
  }
  .tree .canopy {
    width: 40px;
    height: 45px;
    background: #4CAF50;
    border-radius: 50% 50% 10% 10%;
    margin: 0 auto;
  }
  .tree.small .trunk { width: 6px; height: 20px; }
  .tree.small .canopy { width: 28px; height: 32px; }

  .building {
    position: absolute;
    bottom: 0;
    background: #78909C;
  }
  .building .window-b {
    width: 8px;
    height: 10px;
    background: #E3F2FD;
    position: absolute;
  }
  .building .roof {
    position: absolute;
    top: -8px;
    left: -2px;
    right: -2px;
    height: 8px;
    background: #546E7A;
  }

  /* === Foreground — poles & fence (fastest) === */
  .foreground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 200px;
    z-index: 5;
    animation: scroll-fast 3s linear infinite;
  }

  .pole {
    position: absolute;
    bottom: 50px;
    width: 4px;
    height: 150px;
    background: #455A64;
  }
  .pole::before {
    content: '';
    position: absolute;
    top: 0;
    left: -12px;
    width: 28px;
    height: 3px;
    background: #455A64;
  }
  .pole::after {
    content: '';
    position: absolute;
    top: 10px;
    left: -8px;
    width: 20px;
    height: 2px;
    background: #455A64;
  }

  .fence-line {
    position: absolute;
    bottom: 48px;
    left: 0;
    width: 100%;
    height: 2px;
    background: repeating-linear-gradient(90deg, #78909C 0px, #78909C 20px, transparent 20px, transparent 25px);
  }

  /* === Ground === */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: linear-gradient(180deg, #8BC34A 0%, #689F38 30%, #5D4037 100%);
    z-index: 6;
  }
  .ground-scroll {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 60px;
    z-index: 7;
    animation: scroll-fast 2s linear infinite;
    background: repeating-linear-gradient(90deg,
      transparent 0px, transparent 80px,
      rgba(101,67,33,0.15) 80px, rgba(101,67,33,0.15) 82px
    );
  }

  /* === Window frame overlay === */
  .window-frame {
    position: absolute;
    inset: 0;
    z-index: 10;
    border: 16px solid #37474F;
    border-radius: 24px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  .window-frame::before {
    content: '';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: calc(100% + 32px);
    background: #37474F;
  }

  /* === Glass reflection === */
  .glass {
    position: absolute;
    inset: 0;
    z-index: 11;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(255,255,255,0.04) 100%);
    pointer-events: none;
  }

  /* === Animations === */
  @keyframes scroll-slow {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes scroll-medium {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes scroll-fast {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* === Label === */
  .label {
    position: fixed;
    bottom: 16px;
    right: 20px;
    color: #555;
    font-size: 12px;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="window">
  <!-- Sky gradient -->
  <div class="sky"></div>

  <!-- Clouds -->
  <div class="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
  </div>

  <!-- Distant mountains (SVG) -->
  <div class="mountains-far">
    <svg viewBox="0 0 1600 160" preserveAspectRatio="none">
      <polygon fill="#7986CB" points="0,160 80,60 160,120 240,40 340,100 420,30 500,90 580,50 660,110 740,35 800,80 800,160"/>
      <polygon fill="#7986CB" points="800,160 880,55 960,115 1040,35 1140,95 1220,25 1300,85 1380,45 1460,105 1540,30 1600,75 1600,160"/>
      <polygon fill="#9FA8DA" opacity="0.6" points="0,160 100,80 200,130 320,70 400,110 520,55 600,100 700,65 800,120 800,160"/>
      <polygon fill="#9FA8DA" opacity="0.6" points="800,160 900,75 1000,125 1120,65 1200,105 1320,50 1400,95 1500,60 1600,115 1600,160"/>
    </svg>
  </div>

  <!-- Green hills -->
  <div class="hills">
    <svg viewBox="0 0 1600 140" preserveAspectRatio="none">
      <ellipse cx="120" cy="140" rx="180" ry="80" fill="#66BB6A"/>
      <ellipse cx="400" cy="140" rx="200" ry="90" fill="#4CAF50"/>
      <ellipse cx="700" cy="140" rx="160" ry="70" fill="#66BB6A"/>
      <ellipse cx="920" cy="140" rx="180" ry="85" fill="#4CAF50"/>
      <ellipse cx="1200" cy="140" rx="200" ry="75" fill="#66BB6A"/>
      <ellipse cx="1480" cy="140" rx="170" ry="90" fill="#4CAF50"/>
    </svg>
  </div>

  <!-- Trees and buildings -->
  <div class="midground">
    <!-- Trees -->
    <div class="tree" style="left:40px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:100px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree" style="left:180px"><div class="canopy"></div><div class="trunk"></div></div>
    <!-- Building -->
    <div class="building" style="left:260px; width:50px; height:70px;">
      <div class="roof"></div>
      <div class="window-b" style="top:15px; left:8px;"></div>
      <div class="window-b" style="top:15px; left:30px;"></div>
      <div class="window-b" style="top:35px; left:8px;"></div>
      <div class="window-b" style="top:35px; left:30px;"></div>
    </div>
    <div class="tree" style="left:340px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:400px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree" style="left:460px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:520px"><div class="canopy"></div><div class="trunk"></div></div>
    <!-- Building -->
    <div class="building" style="left:570px; width:40px; height:55px;">
      <div class="roof"></div>
      <div class="window-b" style="top:12px; left:6px;"></div>
      <div class="window-b" style="top:12px; left:24px;"></div>
      <div class="window-b" style="top:30px; left:6px;"></div>
      <div class="window-b" style="top:30px; left:24px;"></div>
    </div>
    <div class="tree" style="left:640px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree" style="left:720px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:780px"><div class="canopy"></div><div class="trunk"></div></div>
    <!-- Repeat for seamless loop -->
    <div class="tree" style="left:840px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:900px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree" style="left:980px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="building" style="left:1060px; width:50px; height:70px;">
      <div class="roof"></div>
      <div class="window-b" style="top:15px; left:8px;"></div>
      <div class="window-b" style="top:15px; left:30px;"></div>
      <div class="window-b" style="top:35px; left:8px;"></div>
      <div class="window-b" style="top:35px; left:30px;"></div>
    </div>
    <div class="tree" style="left:1140px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:1200px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree" style="left:1260px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:1320px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="building" style="left:1370px; width:40px; height:55px;">
      <div class="roof"></div>
      <div class="window-b" style="top:12px; left:6px;"></div>
      <div class="window-b" style="top:12px; left:24px;"></div>
      <div class="window-b" style="top:30px; left:6px;"></div>
      <div class="window-b" style="top:30px; left:24px;"></div>
    </div>
    <div class="tree" style="left:1440px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree" style="left:1520px"><div class="canopy"></div><div class="trunk"></div></div>
    <div class="tree small" style="left:1580px"><div class="canopy"></div><div class="trunk"></div></div>
  </div>

  <!-- Foreground poles and fence -->
  <div class="foreground">
    <div class="fence-line"></div>
    <div class="pole" style="left:100px"></div>
    <div class="pole" style="left:300px"></div>
    <div class="pole" style="left:500px"></div>
    <div class="pole" style="left:700px"></div>
    <div class="pole" style="left:900px"></div>
    <div class="pole" style="left:1100px"></div>
    <div class="pole" style="left:1300px"></div>
    <div class="pole" style="left:1500px"></div>
  </div>

  <!-- Ground -->
  <div class="ground"></div>
  <div class="ground-scroll"></div>

  <!-- Window frame -->
  <div class="window-frame"></div>
  <div class="glass"></div>
</div>

<div class="label">車窓風景 PoC — Southgate Research</div>

</body>
</html>
